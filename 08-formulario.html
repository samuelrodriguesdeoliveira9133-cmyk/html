<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8>ontent="width=device-width, initial-scale=1.0">
    <title>formulario em html</title>
</head>
<body><h1>Formulario em html</h1>
    
    <h2>Cadastro de novo usuario</h2>
    <form action="">
        <label for="nome">Nome completo</label> <br>
        <input 
        type="text" 
        name="nome"
     id="nome"
     placeholder="Digite seu nome"
    > <br>
    <label for="email">Email</label> <br>
    <input 
    type="email" 
    name="email"
     id="email"
     placeholder="Digite seu email"
     >
<label for="Senha">Senha:</label>
<input type="password" name="Senha" id="Senha" placeholder="Digite sua senha"
><br>
<label for="data-nascimento">Data de nascimento:</label> <br>
<input type="date" 
name="data-nascimento" 
id="data-nascimento"
placeholder="00/00/0000">
<label for="genero">genero</label> <br><br>
<label for="feminino">feminino</label>
<input type="radio" 
name="feminino" 
id="feminino"
value="feminino">
<label for="masculino">Masculino</label>
<input type="radio" name="masculino" id="masculino"
value="masculino"
> 
<br><br>
<label for="setor">setor</label> <br><br>
<select name="setor" id="setor">
    <option value="Vendas">vendas</option>
    <option value="ti">ti</option>
    <option value="marketing">marketing</option>
</select>
<br><br>
<label for="hobby">hobby (escolha uma ou mais opção)</label> <br> <br>
<input type="checkbox" name="hobby" id="leitura">
<label for="leitura">leitura</label>
<input type="checkbox" name="hobby" id="musica">
<label for="musica">musica</label>
<br><br>
<button type="submit">cadrastrar</button>
<button type="reset">limpar</button>
    </form>
</body>
</html>
